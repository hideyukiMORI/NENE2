name: Frontend

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-check:
    name: npm Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix frontend

      - name: Run frontend checks
        run: npm run check --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  e2e-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run Playwright smoke
        run: npm run test:e2e --prefix frontend
