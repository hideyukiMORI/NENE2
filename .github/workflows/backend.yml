name: Backend

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: backend-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  composer-check:
    name: Composer Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run backend checks
        run: composer check

      - name: Verify OpenAPI docs are up to date
        run: |
          composer openapi:docs
          git diff --exit-code docs/reference/http-endpoints.md

      - name: Verify howto index is up to date
        run: |
          composer howto:index
          git diff --exit-code docs/howto/README.md 'docs/*/howto/README.md' docs/howto/by-tag.md

      - name: Validate howto frontmatter
        run: composer howto:frontmatter -- --require-all
