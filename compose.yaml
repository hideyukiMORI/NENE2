services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      NENE2_MACHINE_API_KEY: ${NENE2_MACHINE_API_KEY:-}

volumes:
  composer-cache:
